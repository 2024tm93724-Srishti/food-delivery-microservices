version: '3'

services:

  customer-service:
    build: ./customer-service
    ports:
      - "5001:5001"

  restaurant-service:
    build: ./restaurant-service
    ports:
      - "5002:5002"

  order-service:
    build: ./order-service
    ports:
      - "5003:5003"
    depends_on:
      - customer-service
      - restaurant-service

  payment-service:
    build: ./payment-service
    ports:
      - "5004:5004"
    depends_on:
      - order-service